<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; padding: 12px; display: flex; flex-direction: column; }
  h1 { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 10px; text-align: center; flex-shrink: 0; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex: 1; min-height: 0; }
  .chart-cell { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 8px 8px 6px 8px; display: flex; flex-direction: column; min-height: 0; }
  .chart-title { font-size: 11px; font-weight: 700; color: #111; line-height: 1.3; margin-bottom: 1px; flex-shrink: 0; }
  .chart-subtitle { font-size: 9.5px; color: #555; margin-bottom: 2px; flex-shrink: 0; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 3px; flex-shrink: 0; }
  .legend-item { display: flex; align-items: center; gap: 3px; font-size: 8px; color: #444; }
  .legend-line { width: 18px; height: 2px; display: inline-block; }
  .legend-line.solid { background: #0C447C; }
  .legend-line.dashed-dark { background: repeating-linear-gradient(90deg,#0C447C 0,#0C447C 4px,transparent 4px,transparent 7px); }
  .legend-line.dashed-red { background: repeating-linear-gradient(90deg,#C0392B 0,#C0392B 4px,transparent 4px,transparent 7px); }
  .legend-bar { width: 10px; height: 10px; display: inline-block; background: #378ADD; }
  .legend-bar-anomaly { width: 10px; height: 10px; display: inline-block; background: #C47080; }
  .chart-wrap { position: relative; flex: 1; min-height: 0; }
  .chart-notes { font-size: 7.5px; color: #888; margin-top: 3px; line-height: 1.5; flex-shrink: 0; }
  .chart-notes .partial-note { color: #555; }
  .chart-notes a { color: #888; text-decoration: underline; }

function formatPct(val) {
  return (val >= 0 ? '+' : '') + val.toFixed(1).replace('.', ',') + ' %';
}

const refLinePlugin = {
  id: 'refLine',
  afterDraw(chart) {
    const yScale = chart.scales.yRight;
    if (!yScale) return;
    const y = yScale.getPixelForValue(100);
    const { left, right } = chart.chartArea;
    const c = chart.ctx;
    c.save();
    c.beginPath();
    c.strokeStyle = LINE_REF;
    c.lineWidth = 1.5;
    c.setLineDash([4, 4]);
    c.moveTo(left, y);
    c.lineTo(right, y);
    c.stroke();
    c.setLineDash([]);
    c.restore();
  }
};

function buildChart(station, canvasId) {
  const years = Object.keys(station.data).map(Number).sort((a,b)=>a-b);
  const base = station.data[station.firstFull].c;
  const lastYear = years[years.length - 1];
  const pct = (station.data[lastYear].c - base) / base * 100;

  const counts = years.map(y => station.data[y].c);

  // Index: null for partial years, value for full years
  const indices = years.map(y => {
    const d = station.data[y];
    if (d.p) return null;
    return Math.round(d.c / base * 100);
  });

  const barColors = years.map(y => (station.data[y].p || station.data[y].al >= 1) ? BAR_ANOMALY_COLOR : BAR_COLOR);

  // Determine max anomaly level across all years (for legend)
  const maxAl = Math.max(...years.map(y => station.data[y].al));

  // Last reliable year = last year where al < 2 (for subtitle % calculation)
  const lastReliableYear = [...years].reverse().find(y => station.data[y].al < 2) || years[years.length - 1];

  const nYears = years.length;
  const tickStep = nYears > 12 ? 4 : nYears > 8 ? 2 : 1;

  const ctx = document.getElementById(canvasId).getContext('2d');

  new Chart(ctx, {
    data: {
      labels: years.map(String),
      datasets: [
        {
          type: 'bar',
          label: 'Pyöräilijämäärä',
          data: counts,
          backgroundColor: barColors,
          yAxisID: 'yLeft',
          order: 3,
          barPercentage: 0.85,
          categoryPercentage: 0.9
        },
        {
          type: 'line',
          label: 'Suhdeluku',
          data: indices,
          borderColor: LINE_DARK,
          backgroundColor: LINE_DARK,
          pointRadius: 2.5,
          pointHoverRadius: 3,
          borderWidth: 1.5,
          yAxisID: 'yRight',
          order: 1,
          spanGaps: false,
          segment: {
            borderColor: ctx => {
              const al0 = station.data[years[ctx.p0DataIndex]]?.al ?? 0;
              const al1 = station.data[years[ctx.p1DataIndex]]?.al ?? 0;
              return Math.max(al0, al1) >= 2 ? LINE_RED : LINE_DARK;
            },
            borderDash: ctx => {
              const al0 = station.data[years[ctx.p0DataIndex]]?.al ?? 0;
              const al1 = station.data[years[ctx.p1DataIndex]]?.al ?? 0;
              return Math.max(al0, al1) >= 1 ? [5, 4] : undefined;
            }
          }
        },
      ]
    },
    plugins: [refLinePlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: item => item.dataset.label !== '__none__',
          callbacks: {
            label(ctx) {
              if (ctx.dataset.type === 'bar') return ' ' + ctx.raw.toLocaleString('fi-FI') + ' pyöräilijää';
              if (ctx.dataset.label === 'Suhdeluku' && ctx.raw !== null) return ' Suhdeluku: ' + ctx.raw;
              return null;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            font: { size: 7.5 }, color: '#555',
            maxRotation: 45, minRotation: 45,
            autoSkip: false,
            callback(val, idx) { return years[idx]; }
          },
          grid: { display: false }
        },
        yLeft: {
          type: 'linear', position: 'left',
          beginAtZero: true,
          ticks: {
            font: { size: 8 }, color: '#555', maxTicksLimit: 5,
            callback(v) {
              if (v >= 1000000) return (v/1000000).toFixed(1).replace('.',',') + 'M';
              if (v >= 1000) return Math.round(v/1000) + 'k';
              return v;
            }
          },
          grid: { color: '#f0f0f0' }
        },
        yRight: {
          type: 'linear', position: 'right',
          beginAtZero: true,
          ticks: { font: { size: 8 }, color: LINE_DARK, maxTicksLimit: 5 },
          grid: { display: false }
        }
      }
    }
  });

  const reliablePct = (station.data[lastReliableYear].c - base) / base * 100;
  return { firstYear: years[0], lastYear, lastReliableYear, pct: reliablePct, maxAl };
}

function buildGrid() {
  const grid = document.getElementById('grid');

  STATIONS.forEach((st, i) => {
    const cell = document.createElement('div');
    cell.className = 'chart-cell';
    const canvasId = 'c' + i;

    // Title
    const title = document.createElement('div');
    title.className = 'chart-title';
    title.textContent = st.name;
    cell.appendChild(title);

    // Subtitle placeholder
    const sub = document.createElement('div');
    sub.className = 'chart-subtitle';
    cell.appendChild(sub);

    // Legend placeholder
    const legendEl = document.createElement('div');
    legendEl.className = 'chart-legend';
    cell.appendChild(legendEl);

    // Chart wrap
    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';
    const canvas = document.createElement('canvas');
    canvas.id = canvasId;
    wrap.appendChild(canvas);
    cell.appendChild(wrap);

    // Notes
    const notes = document.createElement('div');
    notes.className = 'chart-notes';
    const hasBoth = st.srcNote.includes(';');
    const srcHtml = st.srcNote
      .replace('Pyöräliikenteen laskennat 2017', `<a href="${URL_L1}" target="_blank">Pyöräliikenteen laskennat 2017</a>`)
      .replace('Helsinki Region Infoshare', `<a href="${URL_L2}" target="_blank">Helsinki Region Infoshare</a>`);
    notes.innerHTML = (hasBoth ? 'Lähteet: ' : 'Lähde: ') + srcHtml;
    const partialYears = Object.keys(st.data).filter(y => st.data[y].p).map(Number).sort();
    if (partialYears.length > 0) {
      const pn = document.createElement('span');
      pn.className = 'partial-note';
      pn.textContent = ' · Osavuosi: ' + partialYears.join(', ');
      notes.appendChild(pn);
    }
    cell.appendChild(notes);
    grid.appendChild(cell);

    // Build chart
    const { firstYear, lastYear, lastReliableYear, pct, maxAl } = buildChart(st, canvasId);

    // Fill subtitle
    sub.textContent = st.firstFull + '–' + lastReliableYear + ': ' + formatPct(pct);

    // Fill legend
    const hasPartialOrAnom = Object.values(st.data).some(d => d.p || d.al >= 1);
    const items = [
      { cls: 'bar', label: 'Pyöräilijämäärä' },
      { cls: 'solid', label: 'Suhdeluku (1. vuosi = 100)' },
    ];
    if (hasPartialOrAnom) items.push({ cls: 'bar-anomaly', label: 'Osavuosi tai käyttökatko' });
    const hasAl1 = Object.values(st.data).some(d => d.al === 1);
    const hasAl2 = Object.values(st.data).some(d => d.al >= 2);
    if (hasAl1) items.push({ cls: 'dashed-dark', label: 'Laskuri ei käytössä 7–20 % ajasta' });
    if (hasAl2) items.push({ cls: 'dashed-red', label: 'Laskuri ei käytössä ≥20 % ajasta' });

    items.forEach(item => {
      const li = document.createElement('div');
      li.className = 'legend-item';
      const sym = document.createElement('span');
      if (item.cls === 'bar') {
        sym.className = 'legend-bar';
      } else if (item.cls === 'bar-anomaly') {
        sym.className = 'legend-bar-anomaly';
      } else {
        sym.className = 'legend-line ' + item.cls;
      }
      li.appendChild(sym);
      const lbl = document.createElement('span');
      lbl.textContent = item.label;
      li.appendChild(lbl);
      legendEl.appendChild(li);
    });
  });
}

buildGrid();
</script>
