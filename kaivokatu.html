<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaivokatu – Helsingin pyöräilijämäärät</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; padding: 16px; max-width: 820px; }
  .chart-cell { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 12px 12px 8px 12px; display: flex; flex-direction: column; }
  .chart-title { font-size: 14px; font-weight: 700; color: #111; line-height: 1.3; margin-bottom: 2px; }
  .chart-subtitle { font-size: 12px; color: #555; margin-bottom: 4px; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #444; }
  .legend-line { width: 22px; height: 2px; display: inline-block; }
  .legend-line.solid { background: #0C447C; }
  .legend-line.dashed-dark { background: repeating-linear-gradient(90deg,#0C447C 0,#0C447C 4px,transparent 4px,transparent 7px); }
  .legend-line.dashed-red { background: repeating-linear-gradient(90deg,#C0392B 0,#C0392B 4px,transparent 4px,transparent 7px); }
  .legend-bar { width: 12px; height: 12px; display: inline-block; background: #378ADD; }
  .legend-bar-anomaly { width: 12px; height: 12px; display: inline-block; background: #C47080; }
  .chart-wrap { position: relative; height: 360px; }
  .chart-notes { font-size: 9px; color: #888; margin-top: 6px; line-height: 1.6; }
  .chart-notes a { color: #888; text-decoration: underline; }
</style>
</head>
<body>
<div class="chart-cell">
  <div class="chart-title">Kaivokatu</div>
  <div class="chart-subtitle" id="sub"></div>
  <div class="chart-legend" id="legend"></div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="chart-notes" id="notes"></div>
</div>
<script>
const URL_L2 = 'https://hri.fi/data/dataset/helsingin-pyorailijamaarat';
const BAR_COLOR = '#378ADD';
const BAR_ANOMALY_COLOR = '#C47080';
const LINE_DARK = '#0C447C';
const LINE_RED  = '#C0392B';
const LINE_REF  = '#888';

const STATION = {
  name: 'Kaivokatu', firstFull: 2018,
  srcNote: 'Helsinki Region Infoshare (2017–2025)',
  data: {2017:{c:43724,p:1,al:0},2018:{c:899140,p:0,al:0},2019:{c:901293,p:0,al:0},2020:{c:821182,p:0,al:0},2021:{c:658781,p:0,al:0},2022:{c:666321,p:0,al:0},2023:{c:683169,p:0,al:0},2024:{c:433286,p:0,al:0},2025:{c:313637,p:0,al:0}}
};

function formatPct(v) { return (v>=0?'+':'')+v.toFixed(1).replace('.',',')+' %'; }

const years = Object.keys(STATION.data).map(Number).sort((a,b)=>a-b);
const base = STATION.data[STATION.firstFull].c;
const lastReliableYear = [...years].reverse().find(y => STATION.data[y].al < 2) || years[years.length-1];
const pct = (STATION.data[lastReliableYear].c - base) / base * 100;

document.getElementById('sub').textContent = STATION.firstFull + '–' + lastReliableYear + ': ' + formatPct(pct);

const counts  = years.map(y => STATION.data[y].c);
const indices = years.map(y => STATION.data[y].p ? null : Math.round(STATION.data[y].c / base * 100));
const barColors = years.map(y => (STATION.data[y].p || STATION.data[y].al >= 1) ? BAR_ANOMALY_COLOR : BAR_COLOR);

const refLinePlugin = {
  id: 'refLine',
  afterDraw(chart) {
    const yScale = chart.scales.yRight;
    if (!yScale) return;
    const y = yScale.getPixelForValue(100);
    const { left, right } = chart.chartArea;
    const c = chart.ctx;
    c.save(); c.beginPath();
    c.strokeStyle = LINE_REF; c.lineWidth = 1.5; c.setLineDash([4,4]);
    c.moveTo(left, y); c.lineTo(right, y); c.stroke();
    c.setLineDash([]); c.restore();
  }
};

new Chart(document.getElementById('chart'), {
  data: {
    labels: years.map(String),
    datasets: [
      { type:'bar', label:'Pyöräilijämäärä', data:counts, backgroundColor:barColors, yAxisID:'yLeft', order:3, barPercentage:0.85, categoryPercentage:0.9 },
      { type:'line', label:'Suhdeluku', data:indices, borderColor:LINE_DARK, backgroundColor:LINE_DARK, pointRadius:4, pointHoverRadius:5, borderWidth:2, yAxisID:'yRight', order:1, spanGaps:false,
        segment:{
          borderColor: ctx => Math.max(STATION.data[years[ctx.p0DataIndex]]?.al??0, STATION.data[years[ctx.p1DataIndex]]?.al??0) >= 2 ? LINE_RED : LINE_DARK,
          borderDash:  ctx => Math.max(STATION.data[years[ctx.p0DataIndex]]?.al??0, STATION.data[years[ctx.p1DataIndex]]?.al??0) >= 1 ? [5,4] : undefined
        }
      }
    ]
  },
  plugins: [refLinePlugin],
  options: {
    responsive:true, maintainAspectRatio:false, animation:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label(ctx){
        if(ctx.dataset.type==='bar') return ' '+ctx.raw.toLocaleString('fi-FI')+' pyöräilijää';
        if(ctx.dataset.label==='Suhdeluku'&&ctx.raw!==null) return ' Suhdeluku: '+ctx.raw;
        return null;
      }}}
    },
    scales:{
      x:{ticks:{font:{size:10},color:'#555',maxRotation:45,minRotation:45,autoSkip:false}, grid:{display:false}},
      yLeft:{type:'linear',position:'left',beginAtZero:true, ticks:{font:{size:10},color:'#555',maxTicksLimit:6,callback(v){return v>=1000000?(v/1000000).toFixed(1).replace('.',',')+' M':v>=1000?Math.round(v/1000)+'k':v;}}, grid:{color:'#f0f0f0'}},
      yRight:{type:'linear',position:'right',beginAtZero:true, ticks:{font:{size:10},color:LINE_DARK,maxTicksLimit:6}, grid:{display:false}}
    }
  }
});

// Legend
const legendEl = document.getElementById('legend');
const hasPartialOrAnom = Object.values(STATION.data).some(d=>d.p||d.al>=1);
const items = [
  {cls:'bar',label:'Pyöräilijämäärä'},
  {cls:'solid',label:'Suhdeluku (1. vuosi = 100)'},
];
if(hasPartialOrAnom) items.push({cls:'bar-anomaly',label:'Osavuosi tai käyttökatko'});
if(Object.values(STATION.data).some(d=>d.al===1)) items.push({cls:'dashed-dark',label:'Laskuri ei käytössä 7–20 % ajasta'});
if(Object.values(STATION.data).some(d=>d.al>=2)) items.push({cls:'dashed-red',label:'Laskuri ei käytössä ≥20 % ajasta'});
items.forEach(item=>{
  const li=document.createElement('div'); li.className='legend-item';
  const sym=document.createElement('span');
  if(item.cls==='bar') sym.className='legend-bar';
  else if(item.cls==='bar-anomaly') sym.className='legend-bar-anomaly';
  else sym.className='legend-line '+item.cls;
  li.appendChild(sym);
  const lbl=document.createElement('span'); lbl.textContent=item.label; li.appendChild(lbl);
  legendEl.appendChild(li);
});

// Notes
const hasBoth = STATION.srcNote.includes(';');
document.getElementById('notes').innerHTML =
  (hasBoth?'Lähteet: ':'Lähde: ') +
  STATION.srcNote.replace('Helsinki Region Infoshare',`<a href="${URL_L2}" target="_blank">Helsinki Region Infoshare</a>`);
</script>
</body>
</html>
