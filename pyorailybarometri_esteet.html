<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turvattomuuden tunne pyöräilemättä jättämisen syynä</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
  body { padding: 12px 22px 8px; max-width: 520px; margin: 0 auto; }
  .chart-title    { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 2px; }
  .chart-subtitle { font-size: 11px; color: #777; margin-bottom: 8px; }
  .source { margin-top: 9px; font-size: 10px; color: #aaa; border-top: 1px solid #ececec; padding-top: 6px; line-height: 1.6; }
</style>
</head>
<body>

<div class="chart-title">Turvattomuuden tunne liikenteessä pyöräilemättä jättämisen syynä</div>
<div class="chart-subtitle">% harvoin tai ei lainkaan pyöräilevistä — spontaani vastaus, ei lueteltu</div>

<div style="position:relative;width:100%;height:260px;">
  <canvas id="chart" role="img" aria-label="Pylväskaavio turvattomuuden tunteen osuudesta pyöräilemättä jättämisen syynä 2014–2024."></canvas>
</div>

<div class="source">
  <strong>Lähde:</strong> Helsingin kaupunki, <em>Pyöräilybarometri</em> 2014–2024. n = 828–901 vastaajaa vuosittain (harvoin tai ei lainkaan pyöräilevät).
</div>

<script>
const years = ['2014', '2016', '2018', '2020', '2022', '2024'];
const data  = [8.7, 7.5, 8.1, 7.3, 6.1, 10.9];

const barColors = data.map((_, i) => years[i] === '2024' ? '#0C447C' : '#378ADD');
const barHover  = data.map((_, i) => years[i] === '2024' ? '#042C53' : '#2570c0');

new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: years,
    datasets: [{
      data,
      backgroundColor: barColors,
      hoverBackgroundColor: barHover,
      borderWidth: 0,
      borderRadius: 2,
      barPercentage: 0.8,
      categoryPercentage: 0.65,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#fff',
        borderColor: 'rgba(0,0,0,0.12)',
        borderWidth: 1,
        titleColor: 'rgba(0,0,0,0.75)',
        bodyColor: 'rgba(0,0,0,0.6)',
        padding: 10,
        callbacks: {
          label: ctx => ` ${ctx.parsed.y.toFixed(1)} % vastaajista`,
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: 'rgba(0,0,0,0.45)', font: { size: 11 } }
      },
      y: {
        min: 0, max: 14,
        grid: { color: 'rgba(0,0,0,0.06)' },
        ticks: {
          color: 'rgba(0,0,0,0.45)',
          font: { size: 11 },
          callback: v => v + ' %',
        }
      }
    }
  }
});
</script>
</body>
</html>
