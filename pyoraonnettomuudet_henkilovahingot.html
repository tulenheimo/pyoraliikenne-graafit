<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyöräonnettomuuksien henkilövahingot Helsingissä</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
  body { padding: 12px 22px 8px; max-width: 820px; margin: 0 auto; }

  .chart-title    { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 2px; }
  .chart-subtitle { font-size: 11px; color: #666; margin-bottom: 10px; }

  .toggle-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .toggle-label { font-size: 10.5px; color: #777; }
  .toggle-btn {
    padding: 3px 11px; border-radius: 12px; border: 1.5px solid #c0392b;
    font-size: 10.5px; font-weight: 600; cursor: pointer;
    background: transparent; color: #c0392b;
    transition: background 0.15s, opacity 0.15s;
  }
  .toggle-btn.active  { background: #c0392b18; }
  .toggle-btn.inactive { opacity: 0.3; background: transparent; }

  .chart-container { position: relative; height: 300px; }

  .source {
    margin-top: 9px; font-size: 10px; color: #aaa;
    border-top: 1px solid #ececec; padding-top: 6px; line-height: 1.5;
  }
</style>
</head>
<body>

<div class="chart-title">Pyöräonnettomuuksien henkilövahingot Helsingissä 1981–2024</div>
<div class="chart-subtitle">Tieliikenneonnettomuuksissa kuolleet ja loukkaantuneet polkupyöräilijät vuosittain</div>

<div class="toggle-row">
  <span class="toggle-label">Näytä:</span>
  <button class="toggle-btn active" id="btnTrend">5 vuoden liukuva keskiarvo</button>
</div>

<div class="chart-container">
  <canvas id="myChart"></canvas>
</div>

<div class="source">
  <strong>Lähde:</strong> Helsingin kaupunki. <em>Tieliikenneonnettomuuksissa kuolleet ja loukkaantuneet Helsingissä kulkumuodoittain.</em> kaupunkitieto.hel.fi.
</div>

<script>
const years = [
  1981,1982,1983,1984,1985,1986,1987,1988,1989,1990,
  1991,1992,1993,1994,1995,1996,1997,1998,1999,2000,
  2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,
  2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,
  2021,2022,2023,2024
];

const values = [
  132,130,168,140,115,120,118,113,171,162,
  131,151,139,164,193,147,141,135,132,121,
   95,110, 91,102,108, 95,115,118,128,113,
  114,104,116,108, 98, 95,107,110, 78, 81,
   71, 48, 66, 74
];

// 5-year centred moving average (null for first/last 2)
const ma5 = values.map((_, i) => {
  if (i < 2 || i > values.length - 3) return null;
  return Math.round((values[i-2]+values[i-1]+values[i]+values[i+1]+values[i+2]) / 5);
});

const red      = '#c0392b';
const redLight = 'rgba(192,57,43,0.08)';
const trendCol = 'rgba(100,0,0,0.55)';

const ctx = document.getElementById('myChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: years,
    datasets: [
      {
        id: 'main',
        label: 'Henkilövahingot',
        data: values,
        borderColor: red,
        backgroundColor: redLight,
        borderWidth: 2,
        pointRadius: 2.5,
        pointHoverRadius: 6,
        pointBackgroundColor: red,
        tension: 0.25,
        fill: true,
        order: 2,
      },
      {
        id: 'trend',
        label: '5 v. liukuva keskiarvo',
        data: ma5,
        borderColor: trendCol,
        backgroundColor: 'transparent',
        borderWidth: 1.8,
        borderDash: [5, 3],
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.3,
        fill: false,
        order: 1,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#fff',
        borderColor: 'rgba(0,0,0,0.13)',
        borderWidth: 1,
        titleColor: '#111',
        bodyColor: '#555',
        padding: 10,
        callbacks: {
          label: item => {
            if (item.raw === null) return null;
            if (item.datasetIndex === 0) return ` Henkilövahingot: ${item.raw}`;
            return ` Liukuva keskiarvo: ${item.raw}`;
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(0,0,0,0.05)' },
        ticks: {
          font: { size: 10 },
          color: '#666',
          maxRotation: 0,
          callback: (val, idx) => years[idx] % 5 === 0 ? years[idx] : ''
        }
      },
      y: {
        min: 0,
        suggestedMax: 220,
        grid: { color: 'rgba(0,0,0,0.06)' },
        ticks: { font: { size: 10.5 }, color: '#666' },
        title: {
          display: true,
          text: 'henkilövahinkoa / vuosi',
          font: { size: 10 },
          color: '#999'
        }
      }
    }
  }
});

// Toggle trend line
let trendActive = true;
document.getElementById('btnTrend').addEventListener('click', () => {
  trendActive = !trendActive;
  chart.data.datasets[1].hidden = !trendActive;
  chart.update();
  const btn = document.getElementById('btnTrend');
  btn.classList.toggle('active',   trendActive);
  btn.classList.toggle('inactive', !trendActive);
});
</script>
</body>
</html>
